services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  restcomm:
    image: restcomm/smpp-simulator
    ports:
      - "2776:2776"
    restart: unless-stopped