<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 620" font-family="'Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="850" height="620" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Inbound SMS Flow (Twilio)</text>

  <!-- External Sender -->
  <rect x="40" y="55" width="160" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="120" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">External Sender</text>
  <text x="120" y="95" text-anchor="middle" font-size="10" fill="#991b1b">Sends SMS</text>

  <!-- Step 1: External → Twilio -->
  <line x1="200" y1="80" x2="370" y2="80" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="285" y="73" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">① SMS to customer's Twilio #</text>

  <!-- Twilio Gateway -->
  <rect x="380" y="55" width="180" height="50" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="470" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#881337">Twilio Gateway</text>
  <text x="470" y="95" text-anchor="middle" font-size="10" fill="#9f1239">processes incoming SMS</text>

  <!-- Step 2: Twilio → WebhookServlet -->
  <line x1="560" y1="80" x2="660" y2="80" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="610" y="73" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">② POST callback</text>

  <!-- WebhookServlet -->
  <rect x="670" y="55" width="150" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="745" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">WebhookServlet</text>
  <text x="745" y="92" text-anchor="middle" font-size="10" fill="#475569">/webhook/sms</text>

  <!-- Step 3: INSERT inbound -->
  <line x1="745" y1="105" x2="745" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="755" y="135" font-size="11" fill="#2563eb" font-weight="bold">③ INSERT INTO sms_history (direction='inbound')</text>

  <!-- PostgreSQL Database -->
  <rect x="660" y="160" width="170" height="50" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="745" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">PostgreSQL Database</text>
  <text x="745" y="198" text-anchor="middle" font-size="10" fill="#475569">sms_history table</text>

  <!-- Step 4: Return ID -->
  <line x1="745" y1="210" x2="745" y2="240" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="755" y="230" font-size="11" fill="#16a34a" font-weight="bold">④ Return generated ID</text>

  <!-- Step 5: Return Twilio XML -->
  <line x1="745" y1="245" x2="630" y2="268" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="685" y="262" text-anchor="end" font-size="11" fill="#16a34a" font-weight="bold">⑤ Return valid Twilio XML &lt;Response/&gt;</text>

  <!-- Twilio → Sender (Response) -->
  <line x1="630" y1="275" x2="470" y2="290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="470" y1="295" x2="120" y2="310" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>

  <!-- Svelte Chat Interface -->
  <rect x="40" y="340" width="200" height="50" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="140" y="363" text-anchor="middle" font-size="12" font-weight="bold" fill="#4c1d95">Svelte Chat Interface</text>
  <text x="140" y="380" text-anchor="middle" font-size="10" fill="#6b21a8">Customer Dashboard</text>

  <!-- Step 6: fetch /dashboard -->
  <line x1="240" y1="365" x2="440" y2="365" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="340" y="358" text-anchor="middle" font-size="11" fill="#0891b2" font-weight="bold">⑥ fetch(/dashboard)</text>

  <!-- DashboardServlet -->
  <rect x="450" y="340" width="160" height="50" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="530" y="363" text-anchor="middle" font-size="12" font-weight="bold" fill="#155e75">DashboardServlet</text>
  <text x="530" y="380" text-anchor="middle" font-size="10" fill="#475569">/dashboard</text>

  <!-- Step 7: SELECT from DB -->
  <line x1="610" y1="365" x2="655" y2="193" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="625" y="265" font-size="11" fill="#0891b2" font-weight="bold">⑦ SELECT inbound messages</text>

  <!-- Step 8: Return JSON -->
  <line x1="530" y1="390" x2="140" y2="395" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="335" y="405" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">⑧ Return chat history JSON</text>

  <!-- Legend -->
  <rect x="40" y="450" width="770" height="150" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="425" y="475" text-anchor="middle" font-weight="bold" fill="#334155" font-size="13">Step Sequence</text>

  <rect x="60" y="490" width="730" height="90" rx="6" fill="#f1f5f9"/>
  <text x="75" y="510" font-size="11" fill="#475569">
    <tspan x="75" dy="0" font-weight="bold">①</tspan> External sender texts customer's Twilio phone number
    <tspan x="75" dy="18" font-weight="bold">②</tspan> Twilio dispatches POST callback to WebhookServlet with From/To/Body
    <tspan x="75" dy="18" font-weight="bold">③</tspan> WebhookServlet normalizes phone, matches Twilio number to user ID, INSERTs inbound message
    <tspan x="75" dy="18" font-weight="bold">④-⑤</tspan> Returns generated message ID + valid empty Twilio XML response
    <tspan x="75" dy="18" font-weight="bold">⑥-⑧</tspan> Svelte UI polls /dashboard, SELECTs inbound messages, renders new bubble on left</text>
</svg>